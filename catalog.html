<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CATALOG - COMMUNE</title>
  <link rel="icon" type="image/png" href="assets/icons/favicon.png">
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      margin: 0;
      padding: 0;
      background: var(--site-bg);
      font-family: 'Koch Regular', sans-serif;
      min-height: 100vh;
      min-height: 100dvh;
      overflow: hidden;
      position: relative;
      overscroll-behavior: none;
    }

    .catalog-page-layer {
      position: fixed;
      inset: 0;
      overflow: hidden;
      transition: filter 0.55s ease, opacity 0.55s ease, transform 0.55s ease;
    }

    body.catalog-detail-open .catalog-page-layer {
      filter: blur(14px);
      opacity: 0.38;
      transform: scale(1.015);
      pointer-events: none;
    }

    .catalog-background {
      position: fixed;
      inset: -12vh -12vw;
      z-index: 0;
      overflow: hidden;
      pointer-events: none;
      background: var(--site-bg);
    }

    .catalog-background-track {
      display: flex;
      width: max-content;
      height: 124vh;
      filter: blur(48px);
      transform: translate3d(0, 0, 0) scale(1.04);
      will-change: transform;
    }

    .catalog-background-set {
      display: flex;
      flex: 0 0 auto;
    }

    .catalog-background-panel {
      flex: 0 0 100vw;
      height: 124vh;
      opacity: 0.72;
      overflow: hidden;
    }

    .catalog-background-panel img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transform: scale(1.16);
    }

    .catalog-background::after {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(235, 225, 189, 0.16);
      mix-blend-mode: soft-light;
    }

    .catalog-carousel {
      position: absolute;
      top: 50%;
      left: 0;
      width: 100%;
      overflow: hidden;
      transform: translateY(-50%);
      z-index: 1;
    }

    .catalog-track {
      display: flex;
      width: max-content;
      will-change: transform;
    }

    .catalog-set {
      display: flex;
      flex: 0 0 auto;
      gap: 1rem;
      padding-right: 1rem;
    }

    .catalog-card {
      position: relative;
      flex: 0 0 clamp(270px, 37vw, 480px);
      aspect-ratio: 4 / 5;
      border: var(--border);
      background: var(--site-bg);
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      padding: 0;
      color: var(--ink);
      cursor: pointer;
      font: inherit;
      transition: transform 0.35s ease, border-color 0.35s ease;
    }

    .catalog-card:hover,
    .catalog-card.is-active {
      transform: translateY(-0.25rem);
      border-color: #0000ff;
    }

    .catalog-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .catalog-card-title {
      position: absolute;
      left: 0.7rem;
      bottom: 0.65rem;
      background: var(--site-bg);
      border: var(--border);
      padding: 0.25rem 0.45rem;
      font-size: clamp(0.65rem, 0.4vw + 0.52rem, 0.82rem);
      line-height: 1;
      pointer-events: none;
    }

    #logo-top-center {
      position: fixed;
      top: var(--page-pad);
      left: 50%;
      transform: translateX(-50%);
      max-width: var(--logo-width);
      width: 100%;
      height: auto;
      z-index: 1002;
      pointer-events: none;
      opacity: 0.85;
      display: block;
    }

    #catalog-title {
      position: fixed;
      top: var(--page-pad);
      left: var(--page-pad);
      font-size: var(--nav-font);
      font-weight: bold;
      color: var(--ink);
      z-index: 1001;
      font-family: 'Koch Regular', sans-serif;
    }

    .catalog-tuner {
      position: fixed;
      left: 50%;
      bottom: calc(var(--page-pad) * 1.25);
      z-index: 5;
      width: min(46rem, 48vw);
      transform: translateX(-50%);
      color: var(--ink);
      transition: opacity 0.35s ease;
    }

    .catalog-dots {
      display: flex;
      justify-content: space-between;
      width: 100%;
      margin-bottom: 0.55rem;
      align-items: center;
    }

    .catalog-dot {
      width: clamp(0.58rem, 0.55vw, 0.78rem);
      height: clamp(0.58rem, 0.55vw, 0.78rem);
      border: var(--border);
      border-radius: 50%;
      background: var(--site-bg);
      justify-self: center;
      padding: 0;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.2s ease;
    }

    .catalog-dot:hover,
    .catalog-dot.is-active {
      background: var(--ink);
      transform: scale(1.15);
    }

    .catalog-slider {
      position: relative;
      width: 100%;
      height: 1.65rem;
      cursor: pointer;
      touch-action: none;
    }

    .catalog-slider::before {
      content: "";
      position: absolute;
      top: 50%;
      left: 0;
      width: 100%;
      height: 1px;
      background: var(--ink);
      transform: translateY(-50%);
    }

    .catalog-slider-marker {
      position: absolute;
      top: 0;
      left: var(--active-position, 0%);
      width: 1px;
      height: 100%;
      background: var(--ink);
      transform: translateX(-50%);
      transition: left 0.65s cubic-bezier(0.22, 1, 0.36, 1);
      pointer-events: none;
    }

    .look-detail {
      position: fixed;
      inset: 0;
      z-index: 2000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: clamp(1rem, 2vw, 2rem);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.45s ease;
    }

    .look-detail.is-open {
      opacity: 1;
      pointer-events: auto;
    }

    .look-detail-content {
      width: min(92rem, 96vw);
      min-height: min(78vh, 52rem);
      display: grid;
      grid-template-columns: minmax(18rem, 0.82fr) minmax(19rem, 1fr);
      gap: clamp(1.25rem, 3vw, 4rem);
      align-items: center;
      transform: translateX(8vw) scale(0.9);
      opacity: 0;
      transition: transform 0.7s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.45s ease;
    }

    .look-detail.is-open .look-detail-content {
      transform: translateX(-3vw) scale(1);
      opacity: 1;
    }

    .look-primary {
      margin: 0;
      justify-self: end;
      width: min(42vw, 34rem);
    }

    .look-primary-image {
      width: 100%;
      aspect-ratio: 4 / 5;
      border: var(--border);
      background: var(--site-bg);
      overflow: hidden;
    }

    .look-primary-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .look-primary figcaption,
    .look-detail-title {
      margin-top: 0.7rem;
      font-size: clamp(1.1rem, 1.3vw, 1.65rem);
      font-weight: bold;
    }

    .look-detail-side {
      align-self: center;
    }

    .look-slots {
      display: grid;
      grid-template-columns: repeat(4, minmax(4.2rem, 6.4rem));
      gap: clamp(0.55rem, 0.85vw, 0.85rem);
      margin-top: clamp(1rem, 1.5vw, 1.6rem);
    }

    .look-slot {
      display: block;
      aspect-ratio: 4 / 5;
      border: var(--border);
      background: rgba(235, 225, 189, 0.34);
      padding: 0;
      overflow: hidden;
      cursor: pointer;
      font: inherit;
      min-height: 44px;
      transition: border-color 0.2s ease, opacity 0.2s ease, transform 0.2s ease;
    }

    .look-slot:hover,
    .look-slot.is-selected {
      border-color: #0000ff;
      transform: translateY(-0.15rem);
    }

    .look-slot.is-empty {
      cursor: default;
      opacity: 0.5;
    }

    .look-slot.is-empty:hover {
      border-color: var(--ink);
      transform: none;
    }

    .look-slot img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .look-back {
      position: fixed;
      top: var(--page-pad);
      right: var(--page-pad);
      z-index: 2001;
      border: var(--border);
      background: var(--site-bg);
      color: var(--ink);
      cursor: pointer;
      font: inherit;
      font-size: var(--nav-font);
      font-weight: bold;
      padding: clamp(0.58rem, 0.7vw, 0.8rem) clamp(0.75rem, 1vw, 1rem);
      transition: background 0.2s ease, color 0.2s ease;
    }

    .look-back:hover {
      background: var(--ink);
      color: #fff;
    }

    @media (max-width: 760px) {
      body {
        min-height: 100svh;
      }

      .catalog-page-layer {
        min-height: 100svh;
      }

      #logo-top-center {
        top: calc(0.85rem + env(safe-area-inset-top));
      }

      #catalog-title {
        top: calc(0.85rem + env(safe-area-inset-top));
        left: 0.85rem;
        max-width: calc(100vw - 13rem);
      }

      .catalog-carousel {
        top: 50%;
      }

      .catalog-card {
        flex-basis: clamp(260px, 84vw, 390px);
      }

      .catalog-tuner {
        width: min(21rem, calc(100vw - 1.7rem));
        bottom: calc(1.25rem + env(safe-area-inset-bottom));
      }

      .look-detail {
        align-items: flex-start;
        overflow-y: auto;
        padding: calc(4.8rem + env(safe-area-inset-top)) 0.85rem calc(1.5rem + env(safe-area-inset-bottom));
        -webkit-overflow-scrolling: touch;
      }

      .look-detail-content {
        grid-template-columns: 1fr;
        width: min(26rem, 100%);
        min-height: auto;
        gap: 1rem;
      }

      .look-detail.is-open .look-detail-content {
        transform: translateX(0) scale(1);
      }

      .look-primary {
        width: min(22rem, 100%);
        justify-self: start;
      }

      .look-slots {
        grid-template-columns: repeat(4, minmax(4.6rem, 1fr));
        overflow-x: auto;
        padding-bottom: 0.35rem;
      }

      .look-back {
        top: calc(0.85rem + env(safe-area-inset-top));
        right: 0.85rem;
      }
    }
  </style>
</head>
<body class="show-ui catalog-page">
  <div class="catalog-page-layer" id="catalog-page-layer">
    <div class="catalog-background" aria-hidden="true">
      <div class="catalog-background-track" data-catalog-background-track></div>
    </div>

    <img src="assets/images/commune-logo-main.svg" id="logo-top-center" alt="COMMUNE logo" class="visible">
    <div id="catalog-title">COMMUNE IV</div>

    <section class="catalog-carousel" aria-label="COMMUNE IV catalog carousel">
      <div class="catalog-track" data-catalog-track></div>
    </section>

    <div class="catalog-tuner" aria-label="Catalog tuner">
      <div class="catalog-dots" data-catalog-dots></div>
      <div class="catalog-slider" data-catalog-slider role="slider" tabindex="0" aria-valuemin="1" aria-valuemax="10" aria-valuenow="1" aria-label="Select look">
        <div class="catalog-slider-marker" data-catalog-marker></div>
      </div>
    </div>
  </div>

  <details class="site-index-dropdown">
    <summary>INDEX</summary>
    <nav class="site-index" aria-label="COMMUNE index">
      <a href="index.html">HOME</a>
      <a href="store.html">VOLUME 1</a>
      <a href="catalog.html" aria-current="page">CATALOG</a>
      <a href="sound.html">SOUND</a>
      <a href="opera.html">OPERA</a>
      <a href="cart.html" class="site-index-cart">CART <span data-cart-count>(0)</span></a>
    </nav>
  </details>

  <section class="look-detail" data-look-detail aria-hidden="true">
    <button class="look-back" type="button" data-look-back>BACK</button>
    <div class="look-detail-content">
      <figure class="look-primary">
        <div class="look-primary-image">
          <img src="assets/images/sample-1.png" alt="LOOK 001" data-look-image>
        </div>
        <figcaption data-look-caption>LOOK 001</figcaption>
      </figure>
      <div class="look-detail-side">
        <div class="look-detail-title" data-look-title>LOOK 001</div>
        <div class="look-slots" data-look-slots aria-label="Additional look images"></div>
      </div>
    </div>
  </section>

  <script src="script.js"></script>
  <script src="catalog.js"></script>
</body>
</html>
