<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CATALOG - COMMUNE</title>
  <link rel="icon" type="image/png" href="assets/icons/favicon.png">
  <style>
    @font-face {
      font-family: 'Koch Regular';
      src: url('assets/fonts/Koch Regular.woff2') format('woff2');
      font-weight: 400;
      font-style: normal;
    }

    body {
      margin: 0;
      padding: 0;
      background: #ebe1bd;
      font-family: 'Koch Regular', sans-serif;
      min-height: 100vh;
      overflow: hidden;
      position: relative;
    }

    .catalog-background {
      position: fixed;
      inset: -12vh -12vw;
      z-index: 0;
      overflow: hidden;
      pointer-events: none;
      background: #ebe1bd;
    }

    .catalog-background-track {
      display: flex;
      width: max-content;
      height: 124vh;
      filter: blur(48px);
      transform: translate3d(0, 0, 0) scale(1.04);
      will-change: transform;
      animation: catalog-scroll 90s linear infinite;
    }

    .catalog-background-panel {
      flex: 0 0 100vw;
      height: 124vh;
      opacity: 0.72;
      overflow: hidden;
    }

    .catalog-background-panel img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transform: scale(1.16);
    }

    .catalog-background::after {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(235, 225, 189, 0.16);
      mix-blend-mode: soft-light;
    }

    .catalog-carousel {
      position: absolute;
      top: 50%;
      left: 0;
      width: 100%;
      overflow: hidden;
      transform: translateY(-50%);
      z-index: 1;
    }

    .catalog-track {
      display: flex;
      gap: 1rem;
      width: max-content;
      will-change: transform;
      animation: catalog-scroll 90s linear infinite;
    }

    .catalog-card {
      flex: 0 0 clamp(270px, 37vw, 480px);
      aspect-ratio: 4 / 5;
      border: 1px solid #000;
      background: #ebe1bd;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .catalog-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    @keyframes catalog-scroll {
      from {
        transform: translateX(0);
      }

      to {
        transform: translateX(-50%);
      }
    }

    #home-button {
      position: fixed;
      top: 1rem;
      right: 1.5rem;
      font-size: 1rem;
      font-weight: bold;
      color: #000;
      padding: 0.75rem 1.25rem;
      border: none;
      cursor: pointer;
      z-index: 1001;
      font-family: 'Koch Regular', sans-serif;
      background: none;
    }

    #logo-top-center {
      position: fixed;
      top: 0.75rem;
      left: 50%;
      transform: translateX(-50%);
      max-width: 200px;
      width: 100%;
      height: auto;
      z-index: 1002;
      pointer-events: none;
      opacity: 0.85;
      display: block;
    }

    #catalog-title {
      position: fixed;
      top: 1rem;
      left: 1.5rem;
      font-size: 1rem;
      font-weight: bold;
      color: #000;
      z-index: 1001;
      font-family: 'Koch Regular', sans-serif;
    }

    @media (max-width: 760px) {
      .catalog-track {
        animation-duration: 70s;
      }

      .catalog-background-track {
        animation-duration: 70s;
      }

      .catalog-card {
        flex-basis: clamp(240px, 78vw, 375px);
      }
    }
  </style>
</head>
