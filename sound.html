<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>SOUND - VOLUME</title>
  <link rel="stylesheet" href="style.css?v=tiles-live-5" />
  <link rel="icon" type="image/png" href="assets/icons/favicon.png" />
</head>
<body class="show-ui">
  <img src="assets/images/commune-logo-main.svg" id="logo-top-center" alt="VOLUME logo" class="visible" />

  <details class="site-index-dropdown">
    <summary>INDEX</summary>
    <nav class="site-index" aria-label="VOLUME index">
      <a href="index.html">HOME</a>
      <a href="catalog.html">VOLUME 1</a>
      <a href="sound.html" aria-current="page">SOUND</a>
      <span class="site-index-spacer" aria-hidden="true"></span>
      <a href="store.html">SHOP</a>
      <a href="cart.html" class="site-index-cart">CART <span data-cart-count>(0)</span></a>
    </nav>
  </details>

  <main class="sound-page">
    <div class="sound-tracklist">
      <div class="sound-track">
        <div class="sound-controls">
          <span>LET IT BURN</span>
          <button type="button" data-audio-toggle="sound-track-1">[PLAY]</button>
        </div>
        <audio id="sound-track-1" src="assets/audio/SOUND/1.LET IT BURN.mp3" preload="none"></audio>
      </div>

      <div class="sound-track">
        <div class="sound-controls">
          <span>OVER AND OVER</span>
          <button type="button" data-audio-toggle="sound-track-2">[PLAY]</button>
        </div>
        <audio id="sound-track-2" src="assets/audio/SOUND/2.OVER AND OVER.mp3" preload="none"></audio>
      </div>

      <div class="sound-track">
        <div class="sound-controls">
          <span>POLAR</span>
          <button type="button" data-audio-toggle="sound-track-3">[PLAY]</button>
        </div>
        <audio id="sound-track-3" src="assets/audio/SOUND/3.POLAR.mp3" preload="none"></audio>
      </div>

      <div class="sound-track">
        <div class="sound-controls">
          <span>HAVE IT ALL</span>
          <button type="button" data-audio-toggle="sound-track-4">[PLAY]</button>
        </div>
        <audio id="sound-track-4" src="assets/audio/SOUND/4.HAVE IT ALL.mp3" preload="none"></audio>
      </div>

      <div class="sound-track">
        <div class="sound-controls">
          <span>PRECIOUS TIME</span>
          <button type="button" data-audio-toggle="sound-track-5">[PLAY]</button>
        </div>
        <audio id="sound-track-5" src="assets/audio/SOUND/5.PRECIOUS TIME.mp3" preload="none"></audio>
      </div>

      <div class="sound-track">
        <div class="sound-controls">
          <span>THX 1138</span>
          <button type="button" data-audio-toggle="sound-track-6">[PLAY]</button>
        </div>
        <audio id="sound-track-6" src="assets/audio/SOUND/6.THX 1138.mp3" preload="none"></audio>
      </div>

      <div class="sound-track">
        <div class="sound-controls">
          <span>NEOPOPULOUS</span>
          <button type="button" data-audio-toggle="sound-track-7">[PLAY]</button>
        </div>
        <audio id="sound-track-7" src="assets/audio/SOUND/7.NEOPOPULOUS.mp3" preload="none"></audio>
      </div>

      <div class="sound-track">
        <div class="sound-controls">
          <span>IN TIMES LIKE THESE</span>
          <button type="button" data-audio-toggle="sound-track-8">[PLAY]</button>
        </div>
        <audio id="sound-track-8" src="assets/audio/SOUND/8. IN TIMES LIKE THESE.mp3" preload="none"></audio>
      </div>

      <div class="sound-track">
        <div class="sound-controls">
          <span>CONSEQUENCE OF TOMORROW</span>
          <button type="button" data-audio-toggle="sound-track-9">[PLAY]</button>
        </div>
        <audio id="sound-track-9" src="assets/audio/SOUND/9.CONSEQUENCE OF TOMORROW.mp3" preload="none"></audio>
      </div>
    </div>

    <div class="sound-player" id="sound-player" aria-hidden="true">
      <div class="sound-player-title" id="sound-player-title">SELECT TRACK</div>
      <div class="sound-player-controls">
        <button type="button" id="sound-prev" aria-label="Previous track">[PREV]</button>
        <button type="button" id="sound-player-toggle" aria-label="Play or pause current track">[PLAY]</button>
        <button type="button" id="sound-next" aria-label="Next track">[NEXT]</button>
      </div>
      <div class="sound-player-progress">
        <span id="sound-current-time">0:00</span>
        <input id="sound-scrubber" type="range" min="0" max="100" value="0" step="0.1" aria-label="Track progress" />
        <span id="sound-duration">0:00</span>
      </div>
    </div>
  </main>

  <script src="tile-background.js?v=tiles-live-5"></script>
  <script src="script.js"></script>
</body>
</html>
