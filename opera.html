<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OPERA - COMMUNE</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" type="image/png" href="assets/icons/favicon.png" />
  <style>
    body {
      background: #eaeaea;
      margin: 0;
      font-family: "Helvetica LT Std", sans-serif;
    }

    .opera-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 1rem;
      padding: 2rem;
      margin-top: 6rem;
    }

    .opera-item {
      background: #fff;
      border: 1px solid #ccc;
      padding: 0.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      font-size: 0.75rem;
    }

    .opera-item img {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
    }

    .opera-info {
      margin-top: 0.5rem;
      text-align: center;
    }

    .opera-name {
      font-weight: bold;
    }

    .opera-size,
    .opera-price {
      opacity: 0.7;
      font-size: 0.65rem;
    }

    .add-button {
      margin-top: 0.5rem;
      border: 1px solid #000;
      padding: 0.25rem 0.75rem;
      background: transparent;
      cursor: pointer;
      font-size: 0.65rem;
      font-family: inherit;
    }
  </style>
</head>
<body class="show-ui">
  <img src="assets/images/commune-logo-main.svg" id="logo-top-center" alt="COMMUNE logo" class="visible" />

  <div id="home-button" role="button" tabindex="0">HOME</div>
  <div id="cart-button" role="button" tabindex="0">CART (0)</div>

  <div class="opera-grid">
    <div class="opera-item" data-product="MASCOT T-SHIRT" data-size="BALANCED" data-price="30">
      <img src="assets/images/product/opera-item.jpg" alt="MASCOT T-SHIRT" />
      <div class="opera-info">
        <div class="opera-name">MASCOT T-SHIRT</div>
        <div class="opera-size">Size: BALANCED</div>
        <div class="opera-price">$30</div>
        <button class="add-button" type="button">Add to Cart</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
