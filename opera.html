<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OPERA - COMMUNE</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" type="image/png" href="assets/icons/favicon.png" />
  <style>
    body {
      background: #ebe1bd;
      margin: 0;
      font-family: "Koch Regular", sans-serif;
    }

    .opera-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(clamp(13rem, 18vw, 18rem), 1fr));
      gap: clamp(1rem, 1.5vw, 1.6rem);
      padding: calc(var(--page-pad) * 5) var(--page-pad) calc(var(--page-pad) * 2);
      width: min(76rem, 100%);
      margin: 0 auto;
    }

    .opera-item {
      background: #ebe1bd;
      border: 1px solid #000;
      padding: clamp(0.65rem, 0.9vw, 0.9rem);
      display: flex;
      flex-direction: column;
      align-items: center;
      font-size: var(--ui-font);
    }

    .opera-item img {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
    }

    .opera-info {
      margin-top: 0.5rem;
      text-align: center;
    }

    .opera-name {
      font-weight: bold;
    }

    .opera-size,
    .opera-price {
      opacity: 0.7;
      font-size: 0.82em;
    }

    .add-button {
      margin-top: 0.5rem;
      border: 1px solid #000;
      padding: 0.45rem 0.85rem;
      background: transparent;
      cursor: pointer;
      font-size: 0.82em;
      font-family: inherit;
    }

    @media (max-width: 760px) {
      .opera-grid {
        grid-template-columns: 1fr;
        padding: calc(4.8rem + env(safe-area-inset-top)) 0.85rem calc(1.5rem + env(safe-area-inset-bottom));
      }

      .opera-item {
        max-width: 24rem;
        width: 100%;
        margin: 0 auto;
      }

      .add-button {
        min-height: 44px;
      }
    }
  </style>
</head>
<body class="show-ui">
  <img src="assets/images/commune-logo-main.svg" id="logo-top-center" alt="COMMUNE logo" class="visible" />

  <details class="site-index-dropdown">
    <summary>INDEX</summary>
    <nav class="site-index" aria-label="COMMUNE index">
      <a href="index.html">HOME</a>
      <a href="store.html">VOLUME 1</a>
      <a href="catalog.html">CATALOG</a>
      <a href="sound.html">SOUND</a>
      <a href="opera.html" aria-current="page">OPERA</a>
      <a href="cart.html" class="site-index-cart">CART <span data-cart-count>(0)</span></a>
    </nav>
  </details>

  <div class="opera-grid">
    <div class="opera-item" data-product="MASCOT T-SHIRT" data-size="BALANCED" data-price="30">
      <img src="assets/images/product/opera-item.jpg" alt="MASCOT T-SHIRT" />
      <div class="opera-info">
        <div class="opera-name">MASCOT T-SHIRT</div>
        <div class="opera-size">Size: BALANCED</div>
        <div class="opera-price">$30</div>
        <button class="add-button" type="button">Add to Cart</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
