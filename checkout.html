<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>CHECKOUT - COMMUNE</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" type="image/png" href="assets/icons/favicon.png" />
</head>
<body class="show-ui">
  <img src="assets/images/commune-logo-main.svg" id="logo-top-center" alt="COMMUNE logo" class="visible" />

  <details class="site-index-dropdown">
    <summary>INDEX</summary>
    <nav class="site-index" aria-label="COMMUNE index">
      <a href="index.html">HOME</a>
      <a href="store.html">VOLUME 1</a>
      <a href="catalog.html">CATALOG</a>
      <a href="sound.html">SOUND</a>
      <a href="opera.html">OPERA</a>
      <a href="cart.html" class="site-index-cart">CART <span data-cart-count>(0)</span></a>
    </nav>
  </details>

  <main class="checkout-page">
    <h1>CHECKOUT</h1>
    <p class="checkout-note">Checkout is not currently active. This page is a temporary order inquiry form.</p>

    <div id="checkout-cart-summary" class="checkout-cart-summary"></div>

    <form id="checkout-form">
      <label>
        Full Name
        <input type="text" name="name" autocomplete="name" required />
      </label>
      <label>
        Email Address
        <input type="email" name="email" autocomplete="email" required />
      </label>
      <label>
        Shipping Address
        <textarea name="address" rows="4" required></textarea>
      </label>
      <button type="submit">SEND INQUIRY</button>
    </form>

    <div id="confirmation" hidden>Inquiry noted. Checkout is not active yet.</div>
  </main>

  <script src="script.js"></script>
  <script src="checkout.js"></script>
</body>
</html>
