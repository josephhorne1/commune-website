<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CHECKOUT - COMMUNE</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" type="image/png" href="assets/icons/favicon.png" />
</head>
<body class="show-ui">
  <img src="assets/images/commune-logo-main.svg" id="logo-top-center" alt="COMMUNE logo" class="visible" />
  <button id="home-button" type="button">HOME</button>

  <main class="checkout-page">
    <h1>CHECKOUT</h1>
    <p class="checkout-note">Checkout is not currently active. This page is a temporary order inquiry form.</p>

    <div id="checkout-cart-summary" class="checkout-cart-summary"></div>

    <form id="checkout-form">
      <label>
        Full Name
        <input type="text" name="name" autocomplete="name" required />
      </label>
      <label>
        Email Address
        <input type="email" name="email" autocomplete="email" required />
      </label>
      <label>
        Shipping Address
        <textarea name="address" rows="4" required></textarea>
      </label>
      <button type="submit">SEND INQUIRY</button>
    </form>

    <div id="confirmation" hidden>Inquiry noted. Checkout is not active yet.</div>
  </main>

  <script src="checkout.js"></script>
</body>
</html>
